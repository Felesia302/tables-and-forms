<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <form method="POST" action="/pets/orders">

        <div>
            <label for="name">Кличка питомца:</label>
            <input type="text" id="name" name="name" value="Барсик" placeholder="Введите имя" required>
        </div>

        <div>
            <label for="birth">Дата рождения:</label>
            <input type="date" id="birth" name="dateOfBirth" value="2024-01-01" required>
        </div>

        <div>
            <label for="petType">Тип питомца:</label>
            <select id="petType" name="petType">
                <option value="dog">Собака</option>
                <option value="cat" selected>Кошка</option>
                <option value="reptile">Рептилия</option>
            </select>
        </div>

        <div>
            <fieldset>
                <legend>Пол питомца:</legend>
                <label><input type="radio" name="gender" value="boy" checked> Самец</label>
                <label><input type="radio" name="gender" value="girl"> Самка</label>
            </fieldset>
        </div>

        <div>
            <label for="eyeColor">Цвет глаз:</label>
            <input type="color" id="eyeColor" name="eyeColor" value="#8b4513">
        </div>

        <div>
            <label for="tail">Длина хвоста в см:</label>
            <input type="number" id="tail" name="tailLength" value="15" placeholder="0" required>
        </div>

        <div>
            <label for="email">Ваш Email:</label>
            <input type="email" id="email" name="email" value="test@mail.ru" placeholder="example@mail.ru" required>
        </div>

        <div>
            <label for="phone">Ваш Телефон:</label>
            <input type="tel" id="phone" name="phone" value="+79991234567" placeholder="+7 (___) ___-__-__" required>
        </div>

        <div>
            <label for="bio">Особенности характера:</label>
            <textarea id="bio" name="bio" placeholder="Например: любит играть с мячиком"></textarea>
        </div>

        <div>
            <label>
                <input type="checkbox" name="rules" value="true" checked required>
                Я согласен с правилами
            </label>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit">Отправить заказ</button>

            <button type="reset">Очистить форму</button>
        </div>
    </form>

</main>
</body>
</html>
